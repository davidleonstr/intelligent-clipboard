<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading Screen</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', system-ui, sans-serif;
    }

    body {
        background: #1e1e1e;
        color: white;
        overflow: hidden;
        cursor: default;
        height: 100vh;
        width: 100%;
    }

    #splash {
        position: fixed;
        width: 100%;
        height: 100vh;
        background: #1e1e1e;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        text-align: center;
        gap: 0;
        transition: opacity 0.8s ease;
    }

    #splash.fade-out {
        opacity: 0;
        pointer-events: none;
    }

    .app-name {
        font-size: 2rem;
        font-weight: 300;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #e8e8e8;
        opacity: 0;
        animation: fadeUp 0.6s ease 0.25s forwards;
        margin-bottom: 10px;
    }

    .app-name span {
        font-weight: 600;
        color: #4ade80;
    }

    .tagline {
        font-size: 12px;
        letter-spacing: 0.08em;
        color: rgba(232, 232, 232, 0.35);
        text-transform: uppercase;
        opacity: 0;
        animation: fadeUp 0.6s ease 0.4s forwards;
        margin-bottom: 52px;
    }

    .divider {
        width: 1px;
        height: 36px;
        background: linear-gradient(to bottom, transparent, #333, transparent);
        opacity: 0;
        animation: fadeIn 0.5s ease 0.55s forwards;
        margin-bottom: 36px;
    }

    .powered {
        display: flex;
        align-items: center;
        gap: 10px;
        opacity: 0;
        animation: fadeUp 0.6s ease 0.65s forwards;
    }

    .powered-label {
        font-size: 11px;
        letter-spacing: 0.1em;
        color: rgba(232, 232, 232, 0.35);
        text-transform: uppercase;
    }

    .gemini-logo {
        height: 18px;
        width: auto;
        display: block;
    }

    .loader {
        position: absolute;
        bottom: 36px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 6px;
        opacity: 0;
        animation: fadeIn 0.5s ease 1s forwards;
    }

    .dot {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #333;
        animation: pulse 1.4s ease-in-out infinite;
    }

    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    .version {
        position: absolute;
        bottom: 38px;
        right: 28px;
        font-size: 10px;
        letter-spacing: 0.08em;
        color: rgba(232, 232, 232, 0.18);
        opacity: 0;
        animation: fadeIn 0.5s ease 1.1s forwards;
        font-family: 'Courier New', monospace;
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
    }

    @keyframes pulse {
        0%, 80%, 100% { background: #333; transform: scale(1); }
        40%            { background: #4ade80; transform: scale(1.4); }
    }
</style>
</head>
<body>

<div id="splash">
    <div class="app-name"><span>IC</span> &mdash; Intelligent Clipboard</div>
    <div class="tagline">AI-powered clipboard assistant</div>
    <div class="divider"></div>
    <div class="powered">
        <span class="powered-label">Powered by</span>
        <img
            class="gemini-logo"
            src="https://www.gstatic.com/lamda/images/gemini_wordmark_v1_darktheme_1x_9f6f8ae5af2bf7ac.png"
            alt="Gemini AI"
            onerror="this.style.display='none'; document.getElementById('gemini-fallback').style.display='flex';"
        />
        <span id="gemini-fallback" style="display:none; align-items:center; gap:6px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="#fff">
                <path d="M12 2c-.78 5.16-4.84 9.22-10 10 5.16.78 9.22 4.84 10 10 .78-5.16 4.84-9.22 10-10-5.16-.78-9.22-4.84-10-10"/>
            </svg>
            <span style="font-size:13px; font-weight:500; color:rgba(232,232,232,0.6);">Your AI</span>
        </span>
    </div>
</div>

<script>
    const splash = document.getElementById('splash');

    setTimeout(() => {
        splash.classList.add('fade-out');
    }, 2200);
</script>

</body>
</html>
